<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Compare</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #111;
      }

      body {
        padding: 16px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .items {
        display: grid;
        gap: 16px;
        width: 100%;
      }

      .compare {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        width: 100%;
      }

      .row-id {
        margin: 0 0 8px;
        color: #d7d7d7;
        font-size: 16px;
        font-weight: 600;
        line-height: 1.2;
      }

      .image-frame {
        aspect-ratio: 1 / 1;
        width: 100%;
        min-width: 0;
        overflow: hidden;
        background: #050505;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <main id="items" class="items"></main>
    <script>
      const itemsEl = document.getElementById("items");

      function renderItem(item) {
        const id = encodeURIComponent(item.id);

        return `
          <section>
            <div class="row-id">${item.id}</div>
            <div class="compare">
              <div class="image-frame">
                <img src="/image?id=${id}&variant=original" alt="" />
              </div>
              <div class="image-frame">
                <img src="/image?id=${id}&variant=edited" alt="" />
              </div>
            </div>
          </section>
        `;
      }

      async function loadItems() {
        const response = await fetch("/api/codex-native", { cache: "no-store" });
        const state = await response.json();
        itemsEl.innerHTML = (state.items ?? []).map(renderItem).join("");
      }

      loadItems();
    </script>
  </body>
</html>
