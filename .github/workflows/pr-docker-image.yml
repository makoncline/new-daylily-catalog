name: PR Docker Image

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-docker-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.fork != true

    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE_REPO="ghcr.io/makoncline/daylilycatalog"
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-8)"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "primary_tag=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "secondary_tag=pr-${PR_NUMBER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "primary_tag=manual-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "secondary_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Write build env
        run: |
          cat > .env.build <<EOF
          APP_BASE_URL=${{ vars.APP_BASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLOUDFLARE_URL=${{ vars.NEXT_PUBLIC_CLOUDFLARE_URL }}
          NEXT_PUBLIC_SENTRY_ENABLED=false
          TURSO_DATABASE_URL=${{ vars.TURSO_DATABASE_URL }}
          TURSO_DATABASE_AUTH_TOKEN=${{ secrets.TURSO_DATABASE_AUTH_TOKEN }}
          EOF

          if [ -n "${{ secrets.STRIPE_SECRET_KEY }}" ]; then
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env.build
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.primary_tag }}
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.secondary_tag }}
          secret-files: |
            app_env=.env.build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize image tags
        run: |
          {
            echo "## Docker Image"
            echo
            echo "- \`${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.primary_tag }}\`"
            echo "- \`${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.secondary_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
