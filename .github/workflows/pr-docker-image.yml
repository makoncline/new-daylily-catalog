name: Docker Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true
    environment: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      immutable_tag: ${{ steps.meta.outputs.immutable_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE_REPO="ghcr.io/makoncline/daylilycatalog"
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-8)"
          REF_NAME="${{ github.head_ref || github.ref_name }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            IMMUTABLE_TAG="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
            SHOULD_PUSH="false"
          else
            IMMUTABLE_TAG="main-${SHORT_SHA}"
            SHOULD_PUSH="true"
          fi

          {
            echo "image_repo=${IMAGE_REPO}"
            echo "immutable_tag=${IMMUTABLE_TAG}"
            echo "should_push=${SHOULD_PUSH}"
            echo "alias_tags<<EOF"
            if [ "$SHOULD_PUSH" = "true" ]; then
              echo "latest"
            fi
            echo "EOF"
            echo "tags<<EOF"
            echo "${IMAGE_REPO}:${IMMUTABLE_TAG}"
            if [ "$SHOULD_PUSH" = "true" ]; then
              echo "${IMAGE_REPO}:latest"
            fi
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
            echo "org.opencontainers.image.revision=${{ github.sha }}"
            echo "org.opencontainers.image.ref.name=${REF_NAME}"
            echo "org.opencontainers.image.version=${IMMUTABLE_TAG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Show tag strategy
        run: |
          {
            echo "Immutable tag: ${{ steps.meta.outputs.immutable_tag }}"
            echo "Push image: ${{ steps.meta.outputs.should_push }}"
            echo "Alias tags:"
            printf '%s\n' "${{ steps.meta.outputs.alias_tags }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write build env
        id: build-env
        env:
          BUILD_ENVIRONMENT_NAME: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
          BUILD_APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          BUILD_CLOUDFLARE_URL: ${{ vars.NEXT_PUBLIC_CLOUDFLARE_URL }}
          BUILD_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          BUILD_TURSO_DATABASE_URL: ${{ vars.TURSO_DATABASE_URL }}
          BUILD_TURSO_DATABASE_AUTH_TOKEN: ${{ secrets.TURSO_DATABASE_AUTH_TOKEN }}
          BUILD_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          BUILD_ENV_FILE="$RUNNER_TEMP/daylilycatalog-build.env"

          if [ -z "$BUILD_APP_BASE_URL" ] || [ -z "$BUILD_CLOUDFLARE_URL" ] || [ -z "$BUILD_CLERK_PUBLISHABLE_KEY" ]; then
            echo "Configure APP_BASE_URL, NEXT_PUBLIC_CLOUDFLARE_URL, and NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY in the '$BUILD_ENVIRONMENT_NAME' environment." >&2
            exit 1
          fi

          if [ -z "$BUILD_TURSO_DATABASE_URL" ] || [ -z "$BUILD_TURSO_DATABASE_AUTH_TOKEN" ]; then
            echo "Configure TURSO_DATABASE_URL and TURSO_DATABASE_AUTH_TOKEN in the '$BUILD_ENVIRONMENT_NAME' environment." >&2
            exit 1
          fi

          cat > "$BUILD_ENV_FILE" <<EOF
          APP_BASE_URL=$BUILD_APP_BASE_URL
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$BUILD_CLERK_PUBLISHABLE_KEY
          NEXT_PUBLIC_CLOUDFLARE_URL=$BUILD_CLOUDFLARE_URL
          NEXT_PUBLIC_SENTRY_ENABLED=false
          TURSO_DATABASE_URL=$BUILD_TURSO_DATABASE_URL
          TURSO_DATABASE_AUTH_TOKEN=$BUILD_TURSO_DATABASE_AUTH_TOKEN
          EOF

          if [ -n "$BUILD_STRIPE_SECRET_KEY" ]; then
            echo "STRIPE_SECRET_KEY=$BUILD_STRIPE_SECRET_KEY" >> "$BUILD_ENV_FILE"
          fi

          BUILD_ENV_FINGERPRINT="$(sha256sum "$BUILD_ENV_FILE" | cut -d' ' -f1)"

          echo "profile=$BUILD_ENVIRONMENT_NAME" >> "$GITHUB_OUTPUT"
          echo "path=$BUILD_ENV_FILE" >> "$GITHUB_OUTPUT"
          echo "fingerprint=$BUILD_ENV_FINGERPRINT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.meta.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.meta.outputs.should_push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_ENV_FINGERPRINT=${{ steps.build-env.outputs.fingerprint }}
          secret-files: |
            app_env=${{ steps.build-env.outputs.path }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize image tags
        run: |
          {
            echo "## Docker Image"
            echo
            echo "- immutable: \`${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.immutable_tag }}\`"
            echo "- build env: \`${{ steps.build-env.outputs.profile }}\`"
            if [ "${{ steps.meta.outputs.should_push }}" = "true" ]; then
              echo "- alias: \`${{ steps.meta.outputs.image_repo }}:latest\`"
            else
              echo "- aliases: not pushed for pull_request verification builds"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  sync-server-config:
    name: Sync Server Deploy Config
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Trigger VPS config sync webhook
        env:
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_TOKEN" ]; then
            echo "DEPLOY_WEBHOOK_TOKEN secret is required to trigger the VPS config sync webhook." >&2
            exit 1
          fi

          response="$(
            curl --fail --show-error --silent \
              --request POST \
              --url "https://deploy.makon.dev/sync-config/daylilycatalog" \
              --header "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
              --header "Content-Type: application/json" \
              --data "{\"git_ref\":\"${{ github.sha }}\"}"
          )"

          {
            echo "## Config Sync Webhook"
            echo
            echo "- target: \`daylilycatalog\`"
            echo "- git ref: \`${{ github.sha }}\`"
            echo "- response: \`${response}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-server-image:
    name: Deploy Server Image
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - sync-server-config
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Trigger VPS deploy webhook
        env:
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_TOKEN" ]; then
            echo "DEPLOY_WEBHOOK_TOKEN secret is required to trigger the VPS deploy webhook." >&2
            exit 1
          fi

          response="$(
            curl --fail --show-error --silent \
              --request POST \
              --url "https://deploy.makon.dev/deploy/daylilycatalog" \
              --header "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
              --header "Content-Type: application/json" \
              --data "{\"image_tag\":\"${{ needs.build-and-push.outputs.immutable_tag }}\",\"clear_cache\":false}"
          )"

          {
            echo "## Deploy Webhook"
            echo
            echo "- target: \`daylilycatalog\`"
            echo "- image tag: \`${{ needs.build-and-push.outputs.immutable_tag }}\`"
            echo "- response: \`${response}\`"
          } >> "$GITHUB_STEP_SUMMARY"
