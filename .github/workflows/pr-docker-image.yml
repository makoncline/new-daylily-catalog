name: Docker Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      immutable_tag: ${{ steps.meta.outputs.immutable_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE_REPO="ghcr.io/makoncline/daylilycatalog"
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-8)"
          REF_NAME="${{ github.head_ref || github.ref_name }}"
          IMMUTABLE_TAG="main-${SHORT_SHA}"

          {
            echo "image_repo=${IMAGE_REPO}"
            echo "immutable_tag=${IMMUTABLE_TAG}"
            echo "alias_tags<<EOF"
            echo "main"
            echo "latest"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
            echo "org.opencontainers.image.revision=${{ github.sha }}"
            echo "org.opencontainers.image.ref.name=${REF_NAME}"
            echo "org.opencontainers.image.version=${IMMUTABLE_TAG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Show tag strategy
        run: |
          {
            echo "Immutable tag: ${{ steps.meta.outputs.immutable_tag }}"
            echo "Alias tags:"
            printf '%s\n' "${{ steps.meta.outputs.alias_tags }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write build env
        run: |
          cat > .env.build <<EOF
          APP_BASE_URL=https://vps-test.daylilycatalog.com
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_live_Y2xlcmsuZGF5bGlseWNhdGFsb2cuY29tJA
          NEXT_PUBLIC_CLOUDFLARE_URL=https://cf.daylilycatalog.com
          NEXT_PUBLIC_SENTRY_ENABLED=false
          TURSO_DATABASE_URL=libsql://daylily-catalog-makoncline.aws-us-east-1.turso.io
          TURSO_DATABASE_AUTH_TOKEN=${{ secrets.TURSO_DATABASE_AUTH_TOKEN_PROD }}
          EOF

          if [ -n "${{ secrets.STRIPE_SECRET_KEY_PROD }}" ]; then
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY_PROD }}" >> .env.build
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.immutable_tag }}
            ${{ steps.meta.outputs.image_repo }}:main
            ${{ steps.meta.outputs.image_repo }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            app_env=.env.build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize image tags
        run: |
          {
            echo "## Docker Image"
            echo
            echo "- immutable: \`${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.immutable_tag }}\`"
            echo "- alias: \`${{ steps.meta.outputs.image_repo }}:main\`"
            echo "- alias: \`${{ steps.meta.outputs.image_repo }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"

  sync-server-config:
    name: Sync Server Deploy Config
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true

    steps:
      - name: Trigger VPS config sync webhook
        env:
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_TOKEN" ]; then
            echo "DEPLOY_WEBHOOK_TOKEN secret is required to trigger the VPS config sync webhook." >&2
            exit 1
          fi

          response="$(
            curl --fail --show-error --silent \
              --request POST \
              --url "https://deploy.makon.dev/sync-config/daylilycatalog" \
              --header "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
              --header "Content-Type: application/json" \
              --data "{\"git_ref\":\"${{ github.sha }}\"}"
          )"

          {
            echo "## Config Sync Webhook"
            echo
            echo "- target: \`daylilycatalog\`"
            echo "- git ref: \`${{ github.sha }}\`"
            echo "- response: \`${response}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-server-image:
    name: Deploy Server Image
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - sync-server-config
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true

    steps:
      - name: Trigger VPS deploy webhook
        env:
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_TOKEN" ]; then
            echo "DEPLOY_WEBHOOK_TOKEN secret is required to trigger the VPS deploy webhook." >&2
            exit 1
          fi

          response="$(
            curl --fail --show-error --silent \
              --request POST \
              --url "https://deploy.makon.dev/deploy/daylilycatalog" \
              --header "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
              --header "Content-Type: application/json" \
              --data "{\"image_tag\":\"${{ needs.build-and-push.outputs.immutable_tag }}\",\"clear_cache\":false}"
          )"

          {
            echo "## Deploy Webhook"
            echo
            echo "- target: \`daylilycatalog\`"
            echo "- image tag: \`${{ needs.build-and-push.outputs.immutable_tag }}\`"
            echo "- response: \`${response}\`"
          } >> "$GITHUB_STEP_SUMMARY"
