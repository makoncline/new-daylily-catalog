name: PR Tests

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Enable corepack
        run: corepack enable
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm fetch
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: apps/main/local/eslint/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - name: Lint
        run: pnpm main exec eslint src --cache --cache-location local/eslint/.eslintcache --cache-strategy content
      - name: Typecheck
        run: pnpm typecheck

  vitest:
    name: Vitest unit and integration tests (shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - name: Enable corepack
        run: corepack enable
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm fetch
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Vitest unit and integration tests
        run: pnpm main exec vitest run --shard=${{ matrix.shard }}/2

  e2e:
    name: Connected E2E tests (group ${{ matrix.group }}/3)
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork != true
    environment: preview
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3]
    env:
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: "file:./prisma/local-dev.sqlite"
      E2E_PORT: "3100"
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PRICE_ID: ${{ vars.STRIPE_PRICE_ID }}
      STRIPE_WEBHOOK_SECRET: "whsec_test_placeholder"
      CLERK_WEBHOOK_SECRET: "whsec_test_placeholder"
      AWS_ACCESS_KEY_ID: "placeholder"
      AWS_SECRET_ACCESS_KEY: "placeholder"
      AWS_REGION: "us-east-1"
      AWS_BUCKET_NAME: "placeholder"
      NEXT_PUBLIC_CLOUDFLARE_URL: "https://placeholder.cloudflare.com"
    steps:
      - name: Enable corepack
        run: corepack enable
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm fetch
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright system dependencies
        run: pnpm main exec playwright install-deps chromium
      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm main exec playwright install chromium
      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - name: Run connected E2E group
        run: node apps/main/scripts/run-e2e-ci-group.mjs ${{ matrix.group }}
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.group }}-of-3
          path: |
            apps/main/test-results
            apps/main/playwright-report
